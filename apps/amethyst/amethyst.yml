# ─── Keybindings (managed via plist, not YAML) ───────────────────────────
# Reference of current bindings (live in KeyboardShortcuts_* plist entries):
#   cycle-layout            ⌥⇧space         cycle-layout-backward   ⌃⌥⇧space
#   select-tall-layout      ⌥⇧a             select-middle-wide      ⌥⇧s
#   select-fullscreen       ⌥⇧d             select-floating         ⌥⇧f
#   select-bsp-layout       ⌥⇧g             select-uniform-columns  ⌥⇧a (!collision)
#   shrink-main             ⌥⇧j             expand-main             ⌥⇧k
#   focus-cw                ⌥⇧h             focus-ccw               ⌥⇧l
#   swap-cw                 ⇧⌘h             swap-ccw                ⇧⌘l
#   swap-main               ⇧⌘↩             swap-screen-cw          ⌃⌥⇧l
#   swap-screen-ccw         ⌃⌥⇧h            throw-screen-1          ⇧⌘1
#   throw-screen-2          ⇧⌘2             throw-space-1..10       ⌃⌥⇧1..0
#   throw-space-left        ⌃⌥⇧←            throw-space-right       ⌃⌥⇧→
#   reevaluate-windows      ⌥⇧z             relaunch-amethyst       ⌥⇧r
