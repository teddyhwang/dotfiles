TINTY_FZF="~/.local/share/tinted-theming/tinty/tinted-fzf-sh-file.sh"

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @pane_resize '1'
set -g @plugin 'kristijanhusak/tmux-simple-git-status'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'teddyhwang/base16-tmux-powerline'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @sessionx-bind 'o'
set -g @sessionx-preview-location 'top'
set -g @sessionx-preview-ratio '55%'
set -g @sessionx-tmuxinator-mode 'on'
set -g @sessionx-tree-mode 'off'
set -g @sessionx-window-mode 'on'
set -g @sessionx-zoxide-mode 'on'
set -g @yank_action 'copy-pipe'
set -g allow-passthrough on
set -g bell-action none
set -g default-command "$SHELL"
set -g default-shell "$SHELL"
set -g detach-on-destroy off
set -g extended-keys on
set -g extended-keys-format csi-u
set -g focus-events on
set -g mouse on
set -g prefix C-a
set -g renumber-windows on
set -g status-left-length 40
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -ga update-environment SSH_AUTH_SOCK
set -ga update-environment SSH_CONNECTION
set -ga update-environment SSH_CLIENT
set -ga update-environment SSH_TTY

setw -g mode-keys vi
setw -g monitor-activity off

run -b '~/.config/tmux/plugins/tpm/tpm'

unbind %
unbind '"'

bind "-" split-window -v -c "#{pane_current_path}"
bind "|" split-window -h -c "#{pane_current_path}"
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi r send-keys -X rectangle-toggle
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
bind -T prefix A command-prompt -I "#W" "rename-window -- '%%'"
bind -T resize -r h resize-pane -L 5
bind -T resize -r j resize-pane -D 5
bind -T resize -r k resize-pane -U 5
bind -T resize -r l resize-pane -R 5
bind -n End send-keys C-e
bind -n Home send-keys C-a
bind -n S-Enter send-keys Escape "[13;2u"
bind < swap-window -t -1\; select-window -t -1
bind = select-layout even-horizontal
bind > swap-window -t +1\; select-window -t +1
bind C-a switch-client -l
bind Escape copy-mode
bind H if-shell -F '#{pane_at_left}' '' 'swap-pane -d -t "{left-of}"'
bind J if-shell -F '#{pane_at_bottom}' '' 'swap-pane -d -t "{down-of}"'
bind K if-shell -F '#{pane_at_top}' '' 'swap-pane -d -t "{up-of}"'
bind L if-shell -F '#{pane_at_right}' '' 'swap-pane -d -t "{right-of}"'
bind P paste-buffer
bind T break-pane
bind Tab last-pane
bind V choose-window 'join-pane -h -s "%%"'
bind e switch-client -T resize
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind q killp
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

bind ? display-popup -E "\
  [ -f $TINTY_FZF ] && . $TINTY_FZF; \
  tmux list-keys | fzf"
bind b display-popup -E
bind s display-popup -E "\
  [ -f $TINTY_FZF ] && . $TINTY_FZF; \
  current=\"\$(tmux display-message -p '#S')\"; \
  tmux list-sessions -F '#{session_name}: #{session_windows} windows' \
    | awk -v curr=\"\$current\" '{if (\$1 == curr\":\") print \"→ \"\$0; else print \"  \"\$0}' \
    | fzf --reverse --no-sort \
    | sed 's/^[[:space:]→]*//' \
    | cut -d: -f1 \
    | xargs tmux switch-client -t"
bind S display-popup -E "\
  [ -f $TINTY_FZF ] && . $TINTY_FZF; \
  current=\"\$(tmux display-message -p '#S:#I')\"; \
  tmux list-sessions -F '#{session_name}' | while read sess; do \
    echo \"\$sess\"; \
    tmux list-windows -t \"\$sess\" -F '  #{session_name}:#{window_index} #{window_name} (#{window_panes} panes)'; \
  done \
    | awk -v curr=\"\$current\" '{gsub(/^[[:space:]]+/, \"\"); if (\$1 == curr) print \"→ \"\$0; else print \"  \"\$0}' \
    | fzf --reverse --no-sort \
    | sed 's/^[[:space:]→]*//' \
    | awk '{print \$1}' \
    | xargs -r tmux switch-client -t"
bind w choose-tree -Zs
bind W choose-tree -Zw

# Smart pane switching with awareness of vim and fzf
# https://github.com/christoomey/vim-tmux-navigator/issues/188
vim_programs="view|n?vim?"
tui_programs="view|n?vim?|fzf|atuin|tv|pi|opencode|claude"
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\S+/)?g?($vim_programs)(diff)?\$'"
is_tui="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\S+/)?g?($tui_programs)(diff)?\$'"

bind -n C-b if-shell "$is_vim" "send-keys C-b" "send-prefix"
bind -n C-x if-shell "$is_vim" "send-keys C-x" "send-keys C-l"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_tui" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_tui" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\\\" "select-pane -l"

set-hook -g pane-focus-in "if-shell \"$is_vim\" 'set -g status-position top' 'set -g status-position bottom'"
